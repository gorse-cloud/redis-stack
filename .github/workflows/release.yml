name: Release modules

on:
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  build:
    name: Build Redis modules
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Earthly
        uses: earthly/actions-setup@v1

      - name: Build Redis modules
        run: earthly --ci +all

      - name: List modules
        run: ls -lh modules/*.so

      - name: Upload modules to release
        env:
          GITHUB_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: gh release upload "$RELEASE_TAG" modules/*.so --clobber
