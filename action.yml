name: Setup Redis cluster
description: Start a local Redis 8 cluster with built-in Search and TimeSeries.

inputs:
  port:
    description: Redis cluster port used for the health check.
    required: false
    default: "7005"
  retries:
    description: Number of health check attempts.
    required: false
    default: "12"
  interval-seconds:
    description: Seconds to wait between health check attempts.
    required: false
    default: "5"
  project-name:
    description: Docker Compose project name.
    required: false
    default: redis-cluster

runs:
  using: composite
  steps:
    - name: Start Redis cluster
      shell: bash
      env:
        PROJECT_NAME: ${{ inputs.project-name }}
      run: |
        set -euo pipefail

        docker compose \
          -f "$GITHUB_ACTION_PATH/docker-compose.yml" \
          --project-directory "$GITHUB_ACTION_PATH" \
          --project-name "$PROJECT_NAME" \
          up -d

    - name: Wait for Redis cluster
      shell: bash
      env:
        INTERVAL_SECONDS: ${{ inputs.interval-seconds }}
        PORT: ${{ inputs.port }}
        PROJECT_NAME: ${{ inputs.project-name }}
        RETRIES: ${{ inputs.retries }}
      run: |
        set -euo pipefail

        for i in $(seq 1 "$RETRIES"); do
          if docker run --rm --network host docker.io/library/redis:8 \
              redis-cli -p "$PORT" cluster info | grep -q 'cluster_state:ok'; then
            exit 0
          fi
          sleep "$INTERVAL_SECONDS"
        done

        docker compose \
          -f "$GITHUB_ACTION_PATH/docker-compose.yml" \
          --project-directory "$GITHUB_ACTION_PATH" \
          --project-name "$PROJECT_NAME" \
          ps
        docker compose \
          -f "$GITHUB_ACTION_PATH/docker-compose.yml" \
          --project-directory "$GITHUB_ACTION_PATH" \
          --project-name "$PROJECT_NAME" \
          logs --tail=100
        exit 1
