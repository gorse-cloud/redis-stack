name: Setup Redis cluster
description: Download released Redis modules and start a local Redis cluster.

inputs:
  release-tag:
    description: GitHub release tag to download module artifacts from. Empty uses the latest release.
    required: false
    default: ""
  port:
    description: Redis cluster port used for the health check.
    required: false
    default: "7005"
  retries:
    description: Number of health check attempts.
    required: false
    default: "12"
  interval-seconds:
    description: Seconds to wait between health check attempts.
    required: false
    default: "5"
  project-name:
    description: Docker Compose project name.
    required: false
    default: redis-cluster

runs:
  using: composite
  steps:
    - name: Download Redis modules
      shell: bash
      env:
        RELEASE_TAG: ${{ inputs.release-tag }}
      run: |
        set -euo pipefail

        mkdir -p "$GITHUB_ACTION_PATH/modules"
        rm -f "$GITHUB_ACTION_PATH/modules"/*.so

        if [ -n "$RELEASE_TAG" ]; then
          release_url="https://github.com/gorse-cloud/redis-cluster/releases/download/$RELEASE_TAG"
        else
          release_url="https://github.com/gorse-cloud/redis-cluster/releases/latest/download"
        fi

        curl -fsSL --retry 3 "$release_url/module-oss.so" \
          -o "$GITHUB_ACTION_PATH/modules/module-oss.so"
        curl -fsSL --retry 3 "$release_url/redistimeseries.so" \
          -o "$GITHUB_ACTION_PATH/modules/redistimeseries.so"

        test -s "$GITHUB_ACTION_PATH/modules/module-oss.so"
        test -s "$GITHUB_ACTION_PATH/modules/redistimeseries.so"

    - name: Start Redis cluster
      shell: bash
      env:
        PROJECT_NAME: ${{ inputs.project-name }}
      run: |
        set -euo pipefail

        docker compose \
          -f "$GITHUB_ACTION_PATH/docker-compose.yml" \
          --project-directory "$GITHUB_ACTION_PATH" \
          --project-name "$PROJECT_NAME" \
          up -d

    - name: Wait for Redis cluster
      shell: bash
      env:
        INTERVAL_SECONDS: ${{ inputs.interval-seconds }}
        PORT: ${{ inputs.port }}
        PROJECT_NAME: ${{ inputs.project-name }}
        RETRIES: ${{ inputs.retries }}
      run: |
        set -euo pipefail

        for i in $(seq 1 "$RETRIES"); do
          if redis-cli -p "$PORT" ping | grep -q PONG; then
            exit 0
          fi
          sleep "$INTERVAL_SECONDS"
        done

        docker compose \
          -f "$GITHUB_ACTION_PATH/docker-compose.yml" \
          --project-directory "$GITHUB_ACTION_PATH" \
          --project-name "$PROJECT_NAME" \
          ps
        docker compose \
          -f "$GITHUB_ACTION_PATH/docker-compose.yml" \
          --project-directory "$GITHUB_ACTION_PATH" \
          --project-name "$PROJECT_NAME" \
          logs --tail=100
        exit 1
